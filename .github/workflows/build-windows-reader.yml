name: Build Windows Reader

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows reader exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install "PySide6>=6.7"
          python -m pip install pyinstaller

      - name: Build reader exe
        shell: pwsh
        run: |
          .\scripts\build-reader-exe.ps1 -ProjectRoot $PWD.Path -Python python

      - name: Verify reader exe
        shell: pwsh
        run: |
          $exe = Get-Item -LiteralPath "dist\GitHubRadarReader.exe"
          Write-Host "GitHubRadarReader.exe size: $([math]::Round($exe.Length / 1MB, 2)) MB"
          if ($exe.Length -lt 25MB) {
            throw "GitHubRadarReader.exe is unexpectedly small; PySide6/Qt was probably not bundled."
          }

      - name: Prepare release package
        shell: pwsh
        run: |
          $packageRoot = Join-Path $PWD "release\github-radar-windows"
          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null
          Copy-Item -LiteralPath "dist\GitHubRadarReader.exe" -Destination (Join-Path $packageRoot "GitHubRadarReader.exe") -Force
          Copy-Item -LiteralPath "scripts\run-radar.ps1" -Destination (Join-Path $packageRoot "run-radar.ps1") -Force
          Copy-Item -LiteralPath "README.md" -Destination (Join-Path $packageRoot "README.md") -Force
          Compress-Archive -Path (Join-Path $packageRoot "*") -DestinationPath "release\github-radar-windows.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-radar-windows
          path: release/github-radar-windows.zip
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $zip = "release\github-radar-windows.zip"
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $zip --clobber
          } else {
            gh release create $tag $zip --title $tag --notes "Automated GitHub Radar Windows reader build."
          }
